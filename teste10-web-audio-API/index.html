<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Shifter em Tempo Real</title>
</head>
<body>

<input type="file" id="audioFile" accept=".mp3, .wav, .ogg" />
<p>Selecione um arquivo de áudio para pitch shifting em tempo real.</p>

<label for="pitchSlider">Pitch:</label>
<input type="range" id="pitchSlider" min="0.5" max="2" step="0.01" value="1" />
<span id="pitchValue">1</span>

<script>
    document.getElementById('audioFile').addEventListener('change', handleFileSelect);

    function handleFileSelect(event) {
        var file = event.target.files[0];
        if (file) {
            loadAudioFile(file);
        }
    }

    function loadAudioFile(file) {
        var reader = new FileReader();

        reader.onload = function (e) {
            var audioData = e.target.result;
            initializeAudio(audioData);
        };

        reader.readAsArrayBuffer(file);
    }

    function initializeAudio(audioData) {
        var audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var audioSource = audioContext.createBufferSource();

        audioContext.decodeAudioData(audioData, function (buffer) {
            audioSource.buffer = buffer;

            var pitchShifterProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            pitchShifterProcessor.buffer = new Float32Array(4096 * 2);
            pitchShifterProcessor.grainWindow = hannWindow(4096);

            var pitchSlider = document.getElementById('pitchSlider');
            var pitchValue = document.getElementById('pitchValue');

            pitchSlider.addEventListener('input', function () {
                pitchValue.textContent = pitchSlider.value;
            });

            pitchShifterProcessor.onaudioprocess = function (event) {
                var inputData = event.inputBuffer.getChannelData(0);
                var outputData = event.outputBuffer.getChannelData(0);

                var pitchRatio = parseFloat(pitchSlider.value);

                for (var i = 0; i < inputData.length; i++) {
                    var index = i * pitchRatio;
                    var a = Math.floor(index);
                    var b = a + 1;
                    var t = index - a;

                    if (b < inputData.length) {
                        outputData[i] = linearInterpolation(inputData[a], inputData[b], t);
                    } else {
                        outputData[i] = inputData[a];
                    }
                }
            };

            audioSource.connect(pitchShifterProcessor);
            pitchShifterProcessor.connect(audioContext.destination);
            audioSource.start(0);
        }, function (error) {
            console.error('Erro ao decodificar o arquivo de áudio:', error);
        });
    }

    function hannWindow(length) {
        var window = new Float32Array(length);
        for (var i = 0; i < length; i++) {
            window[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (length - 1)));
        }
        return window;
    }

    function linearInterpolation(a, b, t) {
        return a + (b - a) * t;
    }
</script>

</body>
</html>
