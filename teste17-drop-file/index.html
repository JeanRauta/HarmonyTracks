<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrastar e Soltar Arquivos</title>
<style>
    #file-input-container {
        border: 2px dashed #ccc;
        border-radius: 20px;
        width: 300px;
        height: 200px;
        margin: 0 auto;
        text-align: center;
        padding: 10px;
    }

    #file-input-container.highlight {
        border-color: purple;
    }

    p {
        margin-top: 0;
    }

    .highlight p {
        color: purple;
    }
</style>
</head>
<body>

<div id="file-input-container" ondragover="event.preventDefault()" ondrop="dropHandler(event)" ondragenter="dragEnterHandler(event)" ondragleave="dragLeaveHandler(event)">
    <p>Arraste e solte um arquivo aqui</p>
    <input type="file" id="file-input"  onchange="fileInputChangeHandler(event)">
    <button onclick="openFileInput()">Selecionar Arquivo</button>
</div>

<script>
function dragEnterHandler(event) {
    event.preventDefault();
    document.getElementById("file-input-container").classList.add('highlight');
}

function dragLeaveHandler(event) {
    event.preventDefault();
    document.getElementById("file-input-container").classList.remove('highlight');
}

function dropHandler(event) {
    event.preventDefault();
    document.getElementById("file-input-container").classList.remove('highlight');

    // Obter o arquivo que foi arrastado
    var file = event.dataTransfer.files[0];
    
    // Atualizar o campo de entrada de arquivo com o arquivo arrastado
    document.getElementById("file-input").files = event.dataTransfer.files;
    
    // Você pode fazer algo com o arquivo aqui, se necessário
}

function openFileInput() {
    document.getElementById("file-input").click();
}

function fileInputChangeHandler(event) {
    // Você pode fazer algo com o arquivo selecionado, se necessário
    var file = event.target.files[0];
    console.log('Arquivo selecionado:', file);
}
</script>

</body>
</html>
